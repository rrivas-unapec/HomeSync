services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: homesync-db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}
      MSSQL_PID: Developer
    ports:
      - "127.0.0.1:${DB_PORT:-1433}:1433"
    volumes:
      - db-data:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q 'SELECT 1' -b -o /dev/null",
        ]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s

  db-init:
    image: mcr.microsoft.com/mssql-tools:latest
    container_name: homesync-db-init
    depends_on:
      db:
        condition: service_healthy
    environment:
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}
      AppPassword: ${DB_APP_PASSWORD}
    volumes:
      - ./backend/db/init:/scripts:ro
    entrypoint:
      [
        "/bin/bash",
        "-c",
        "set -e; /opt/mssql-tools/bin/sqlcmd -S db,1433 -U sa -P \"$$MSSQL_SA_PASSWORD\" -i /scripts/01-schema.sql -b; /opt/mssql-tools/bin/sqlcmd -S db,1433 -U sa -P \"$$MSSQL_SA_PASSWORD\" -i /scripts/02-app-user.sql -b; echo 'Esquema y usuario de aplicacion aplicados.'",
      ]
    restart: "no"

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: homesync-api
    depends_on:
      db-init:
        condition: service_completed_successfully
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__HomeSyncConnection: "Server=db,1433;Database=HomeSync;User Id=homesync_app;Password=${DB_APP_PASSWORD};TrustServerCertificate=True;Encrypt=True;"
      Jwt__Key: ${JWT_KEY}
      Jwt__Issuer: HomeSync.Api
      Jwt__Audience: HomeSync.Clientes
      Jwt__ExpiraMinutos: "120"
      CorsOrigenesPermitidos__0: http://localhost:3000
    ports:
      - "${API_PORT:-8081}:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/api/propiedades || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  seed:
    image: alpine:3.20
    container_name: homesync-seed
    depends_on:
      api:
        condition: service_healthy
    environment:
      API_BASE_URL: http://api:8080/api
      ADMIN_NAME: Administrador
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    volumes:
      - ./scripts:/scripts:ro
    entrypoint:
      ["/bin/sh", "-c", "apk add --no-cache curl jq coreutils >/dev/null && sh /scripts/seed.sh"]
    restart: "no"

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    container_name: homesync-web
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-3000}:8080"

volumes:
  db-data:
